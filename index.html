<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#1A0808">
  <title>Japan 2026 · Fuksman Family</title>

  <!-- ─── FONTS ─── Load with display=swap so text renders immediately offline -->

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

  <style>
    /* ═══════════════════════════════════════════════
       DESIGN TOKENS
    ═══════════════════════════════════════════════ */
    :root {
      --red:       #8B1A1A;
      --red-dk:    #6B1010;
      --red-lt:    #F8EDED;
      --gold:      #B07C22;
      --gold-lt:   #FBF5E6;
      --sakura:    #E8A4B2;
      --sakura-lt: #FDF2F5;
      --cream:     #FAF8F4;
      --ink:       #1A1008;
      --ink-2:     #3D3028;
      --ink-3:     #7A6E64;
      --ink-4:     #B0A89E;
      --border:    #E8E2DA;
      --border-lt: #F3EFE9;
      --white:     #FFFFFF;
      --shadow-sm: 0 1px 3px rgba(26,8,8,0.06), 0 2px 8px rgba(26,8,8,0.04);
      --shadow:    0 2px 12px rgba(26,8,8,0.09), 0 1px 3px rgba(26,8,8,0.06);
      --shadow-lg: 0 8px 32px rgba(26,8,8,0.13);
      --radius:    18px;
      --radius-md: 12px;
      --radius-sm: 8px;
      --header-h:  108px;
      --font-serif: 'Cormorant Garamond', 'Palatino Linotype', Georgia, serif;
      --font-sans:  'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    /* ═══════════════════════════════════════════════
       RESET & BASE
    ═══════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
    body {
      font-family: var(--font-sans);
      background: var(--cream);
      color: var(--ink);
      line-height: 1.55;
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }
    a { color: inherit; text-decoration: none; }
    button { font-family: var(--font-sans); cursor: pointer; -webkit-tap-highlight-color: transparent; }
    input { font-family: var(--font-sans); }

    /* ═══════════════════════════════════════════════
       STICKY HEADER
    ═══════════════════════════════════════════════ */
    #app-header {
      position: fixed; top: 0; left: 0; right: 0; z-index: 200;
      background: rgba(26, 8, 8, 0.96);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      padding-top: env(safe-area-inset-top, 0px);
    }
    .header-top {
      display: flex; align-items: center; justify-content: space-between;
      padding: 12px 20px 8px;
    }
    .brand { display: flex; align-items: center; gap: 11px; }
    .brand-sakura { font-size: 22px; line-height: 1; }
    .brand-title {
      font-family: var(--font-serif);
      font-size: 19px; font-weight: 300; letter-spacing: 0.6px;
      color: #fff;
    }
    .brand-sub {
      font-size: 10px; color: rgba(255,255,255,0.45);
      letter-spacing: 0.8px; text-transform: uppercase;
      margin-top: 2px;
    }
    .header-right { text-align: right; }
    #jst-clock {
      font-family: 'SF Mono', 'Menlo', 'Monaco', 'Courier New', monospace;
      font-size: 17px; font-weight: 300; letter-spacing: 1.5px; color: #fff;
    }
    #trip-day-label {
      font-size: 10px; color: rgba(255,255,255,0.45);
      letter-spacing: 0.5px; margin-top: 2px;
    }

    /* ─── Tab nav ─── */
    .tab-nav {
      display: flex; border-top: 1px solid rgba(255,255,255,0.07);
    }
    .tab-btn {
      flex: 1; background: none; border: none; border-bottom: 2px solid transparent;
      color: rgba(255,255,255,0.42); font-size: 11px; font-weight: 500;
      letter-spacing: 0.6px; text-transform: uppercase;
      padding: 9px 4px 7px; transition: color 0.18s, border-color 0.18s;
    }
    .tab-btn.active { color: var(--sakura); border-bottom-color: var(--sakura); }

    /* ═══════════════════════════════════════════════
       MAIN / TAB PANELS
    ═══════════════════════════════════════════════ */
    #main-content { padding-top: var(--header-h); }
    .tab-panel {
      display: none; padding: 14px 14px 60px; 
      animation: panelFade 0.22s ease both;
    }
    .tab-panel.active { display: block; }

    @keyframes panelFade {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ═══════════════════════════════════════════════
       TRIP OVERVIEW BANNER
    ═══════════════════════════════════════════════ */
    .trip-banner {
      background: linear-gradient(135deg, var(--red) 0%, var(--red-dk) 60%, #3A0808 100%);
      border-radius: var(--radius); padding: 22px 20px 20px;
      margin-bottom: 14px; color: #fff;
      position: relative; overflow: hidden;
    }
    .trip-banner::before {
      content: ''; position: absolute; inset: 0;
      background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.03'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E") repeat;
    }
    .trip-banner-kana {
      font-family: var(--font-serif); font-size: 11px; font-style: italic;
      opacity: 0.55; letter-spacing: 1px; margin-bottom: 4px;
      position: relative;
    }
    .trip-banner h2 {
      font-family: var(--font-serif); font-size: 28px; font-weight: 300;
      letter-spacing: 1px; margin-bottom: 4px; position: relative;
    }
    .trip-banner .banner-dates {
      font-size: 13px; opacity: 0.72; position: relative;
    }
    .banner-chips {
      display: flex; gap: 6px; flex-wrap: wrap; margin-top: 12px; position: relative;
    }
    .banner-chip {
      background: rgba(255,255,255,0.14); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px; padding: 4px 10px; font-size: 11px; letter-spacing: 0.2px;
    }

    /* ═══════════════════════════════════════════════
       SECTION LABELS
    ═══════════════════════════════════════════════ */
    .section-label {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 1.2px; color: var(--ink-4); padding: 8px 2px 6px;
    }

    /* ═══════════════════════════════════════════════
       DAY CARDS
    ═══════════════════════════════════════════════ */
    .day-card {
      background: var(--white); border-radius: var(--radius);
      margin-bottom: 10px; box-shadow: var(--shadow);
      overflow: hidden; border: 1px solid var(--border-lt);
      animation: cardIn 0.28s ease both;
    }
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .day-card:nth-child(1) { animation-delay: 0.02s; }
    .day-card:nth-child(2) { animation-delay: 0.06s; }
    .day-card:nth-child(3) { animation-delay: 0.10s; }
    .day-card:nth-child(4) { animation-delay: 0.14s; }
    .day-card:nth-child(5) { animation-delay: 0.18s; }
    .day-card:nth-child(6) { animation-delay: 0.22s; }
    .day-card:nth-child(7) { animation-delay: 0.26s; }

    .day-card.is-today {
      border-color: var(--red); box-shadow: 0 0 0 1.5px var(--red), var(--shadow);
    }
    .day-card.is-past { opacity: 0.60; }

    .day-header {
      display: flex; align-items: center; gap: 12px;
      padding: 15px 16px; cursor: pointer; user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .day-num {
      width: 38px; height: 38px; border-radius: 50%; flex-shrink: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; letter-spacing: 0.2px;
      background: var(--border-lt); color: var(--ink-3);
      transition: background 0.2s, color 0.2s;
    }
    .day-card.is-today .day-num { background: var(--red); color: #fff; }
    .day-header-info { flex: 1; min-width: 0; }
    .day-name {
      font-size: 15px; font-weight: 600; color: var(--ink);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .day-sub {
      font-size: 11px; color: var(--ink-4); margin-top: 2px;
      display: flex; align-items: center; gap: 6px;
    }
    .day-city-badge {
      font-size: 10px; font-weight: 600; letter-spacing: 0.5px;
      text-transform: uppercase; padding: 2px 7px; border-radius: 5px;
    }
    .city-tokyo    { background: #EBF3FF; color: #1A5FAA; }
    .city-kyoto    { background: #EEE8FF; color: #5C35B0; }
    .city-yokohama { background: #E6F7FF; color: #0872A2; }

    .today-pill {
      font-size: 10px; font-weight: 700; background: var(--red); color: #fff;
      padding: 2px 8px; border-radius: 20px; letter-spacing: 0.3px;
    }

    .day-chevron {
      color: var(--ink-4); font-size: 14px; flex-shrink: 0;
      transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .day-card.open .day-chevron { transform: rotate(180deg); }

    /* ─── collapsible body ─── */
    .day-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.38s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .day-card.open .day-body { max-height: 4000px; }
    .day-body-inner { padding: 0 16px 16px; }

    /* ─── Hotel bar ─── */
    .hotel-bar {
      display: flex; align-items: center; gap: 10px;
      background: #EBF6EE; border-radius: var(--radius-md);
      padding: 10px 13px; margin-bottom: 12px;
      border-left: 3px solid #2E7D32;
    }
    .hotel-bar-icon { font-size: 15px; }
    .hotel-bar-name { font-size: 12px; font-weight: 600; color: #1B5E20; }
    .hotel-bar-detail { font-size: 11px; color: #388E3C; margin-top: 1px; }
    .hotel-map-link {
      margin-left: auto; font-size: 11px; color: #2E7D32; font-weight: 500;
      display: flex; align-items: center; gap: 3px; flex-shrink: 0;
    }

    /* ─── Day notes ─── */
    .day-note-bar {
      background: var(--sakura-lt); border-radius: var(--radius-md);
      border-left: 3px solid var(--sakura); padding: 10px 13px;
      font-size: 12px; color: var(--ink-2); line-height: 1.55;
      margin-bottom: 12px;
    }

    /* ─── Weather widget ─── */
    .weather-widget {
      display: flex; align-items: center; gap: 10px;
      background: var(--gold-lt); border-radius: var(--radius-md);
      border: 1px solid rgba(176,124,34,0.15);
      padding: 10px 13px; margin-bottom: 14px;
    }
    .wx-icon { font-size: 26px; line-height: 1; }
    .wx-info { flex: 1; }
    .wx-temp { font-size: 14px; font-weight: 600; color: var(--ink); }
    .wx-desc { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
    .wx-rain { font-size: 12px; font-weight: 500; color: #1D6FAD; flex-shrink: 0; }
    .wx-placeholder {
      font-size: 12px; color: var(--ink-4); font-style: italic;
    }
    .wx-loading { font-size: 12px; color: var(--ink-4); animation: pulse 1.5s ease infinite; }
    @keyframes pulse { 0%,100%{opacity:0.5} 50%{opacity:1} }

    /* ═══════════════════════════════════════════════
       TIMELINE — clean layout (verified math)
       All positions from .timeline left edge:
         5–47px   time text (right-aligned, 42px wide)
         50–68px  dot (18px wide, centre 59px)
         75px+    card content
    ═══════════════════════════════════════════════ */
    .timeline { position: relative; padding-left: 75px; }

    .stop-item { position: relative; margin-bottom: 14px; }

    /* Line: only between dots, never through them.
       Starts below dot bottom (top: 9+18+2 = 29px),
       ends reaching into next stop-item gap. */
    .stop-item::after {
      content: ''; position: absolute;
      left: -16px;    /* line centre = 75-16 = 59px from timeline = dot centre */
      top: 29px;      /* just below dot bottom */
      bottom: -14px;  /* into next stop gap */
      width: 2px;
      background: var(--border);
      z-index: 1;
    }
    .stop-item:last-child::after { display: none; }

    /* Time: right-aligned in 42px box, starts 5px from timeline left */
    .stop-time {
      position: absolute;
      left: -70px;    /* 75-70 = 5px from timeline left */
      top: 11px;      /* vertically centred on 18px dot (dot top=9, centre=18) */
      width: 42px;    /* right edge at 47px from timeline, 3px gap before dot */
      text-align: right;
      font-size: 10px; font-weight: 600; color: var(--ink-4);
      line-height: 1.4;
    }

    /* Dot: 18px circle, left edge at 50px from timeline */
    .stop-dot {
      position: absolute;
      left: -25px;    /* 75-25 = 50px from timeline left */
      top: 9px;
      width: 18px; height: 18px; border-radius: 50%;
      border: 2.5px solid #ccc; background: #fff;
      z-index: 2; transition: border-color 0.2s, background 0.2s;
    }
    .stop-dot.t-restaurant { border-color: #8B1A1A; background: #F8EDED; }
    .stop-dot.t-activity   { border-color: #6650CC; background: #EEE8FF; }
    .stop-dot.t-transport  { border-color: #B07C22; background: #FBF5E6; }
    .stop-dot.t-hotel      { border-color: #2E7D32; background: #E8F5E9; }
    .stop-dot.t-flight     { border-color: #0277BD; background: #E1F5FE; }
    .stop-dot.t-market     { border-color: #E65100; background: #FBE9E7; }
    .stop-dot.t-spa        { border-color: #AD1457; background: #FCE4EC; }
    .stop-dot.t-shopping   { border-color: #00695C; background: #E0F2F1; }
    .stop-dot.t-museum     { border-color: #4527A0; background: #EDE7F6; }

    /* ─── Stop card ─── */
    .stop-card {
      background: var(--cream); border-radius: var(--radius-md);
      border: 1px solid var(--border-lt); padding: 11px 13px;
      transition: box-shadow 0.15s;
    }
    .stop-card:active { box-shadow: var(--shadow-sm); }

    .stop-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 8px;
    }
    .stop-title-wrap { flex: 1; min-width: 0; }
    .stop-icon { font-size: 13px; margin-right: 5px; }
    .stop-title {
      font-size: 14px; font-weight: 600; color: var(--ink); line-height: 1.3;
    }
    .stop-subtitle { font-size: 11px; color: var(--ink-3); margin-top: 2px; }

    .stop-badge {
      font-size: 9.5px; font-weight: 600; letter-spacing: 0.2px;
      padding: 2px 7px; border-radius: 5px; flex-shrink: 0;
      background: var(--gold-lt); color: var(--gold);
      border: 1px solid rgba(176,124,34,0.22); white-space: nowrap;
    }
    .stop-badge.michelin { background: #FFF5F5; color: #C0392B; border-color: rgba(192,57,43,0.2); }

    .stop-notes {
      font-size: 12px; color: var(--ink-2); line-height: 1.55;
      margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border-lt);
    }

    .stop-alert {
      display: flex; align-items: flex-start; gap: 6px;
      margin-top: 8px; padding: 7px 10px;
      background: #FFFBEB; border-radius: var(--radius-sm);
      border-left: 3px solid #F59E0B;
      font-size: 11px; color: #92400E; font-weight: 500; line-height: 1.4;
    }

    /* ─── Map action buttons ─── */
    .map-actions {
      display: flex; gap: 5px; margin-top: 10px;
    }
    .map-btn {
      flex: 1; display: flex; align-items: center; justify-content: center;
      gap: 4px; padding: 8px 5px; border-radius: var(--radius-sm);
      font-size: 11px; font-weight: 500; min-height: 34px;
      border: 1px solid var(--border); background: var(--white);
      color: var(--ink-2); transition: all 0.14s;
      -webkit-tap-highlight-color: transparent; cursor: pointer;
    }
    .map-btn:active { transform: scale(0.96); background: var(--border-lt); }
    .map-btn.map-primary {
      background: var(--red); color: #fff; border-color: var(--red);
      font-weight: 600;
    }
    .map-btn.map-primary:active { background: var(--red-dk); }

    /* ═══════════════════════════════════════════════
       UTILITIES TAB
    ═══════════════════════════════════════════════ */
    .util-card {
      background: var(--white); border-radius: var(--radius);
      padding: 18px; box-shadow: var(--shadow);
      border: 1px solid var(--border-lt); margin-bottom: 12px;
    }
    .util-card-title {
      font-family: var(--font-serif); font-size: 18px; font-weight: 400;
      color: var(--ink); margin-bottom: 14px; letter-spacing: 0.3px;
    }

    /* Currency converter */
    .fx-row {
      display: flex; gap: 8px; align-items: flex-end;
    }
    .fx-group { flex: 1; }
    .fx-label {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      letter-spacing: 0.8px; color: var(--ink-4); margin-bottom: 5px;
      display: flex; align-items: center; gap: 5px;
    }
    .fx-flag { font-size: 14px; }
    .fx-input {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid var(--border); border-radius: var(--radius-sm);
      font-size: 18px; font-weight: 500; color: var(--ink);
      background: var(--cream); outline: none;
      -webkit-appearance: none; transition: border-color 0.15s;
    }
    .fx-input:focus { border-color: var(--red); }
    .fx-swap-btn {
      width: 38px; height: 38px; border-radius: 50%;
      background: var(--red-lt); border: none; color: var(--red);
      font-size: 17px; display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; margin-bottom: 1px; transition: background 0.15s;
    }
    .fx-swap-btn:active { background: #F0D0D0; }
    .fx-rate-note {
      font-size: 11px; color: var(--ink-4); text-align: center;
      margin-top: 10px; line-height: 1.5;
    }
    /* ──────────────────────────────────── */
    /* You can update the exchange rate here:
       Search for "FX_RATE" in the <script> section
    ─────────────────────────────────────── */

    /* Info list */
    .info-list { list-style: none; }
    .info-list li {
      display: flex; align-items: flex-start; gap: 11px;
      padding: 10px 0; border-bottom: 1px solid var(--border-lt);
      font-size: 13px; line-height: 1.55;
    }
    .info-list li:last-child { border-bottom: none; padding-bottom: 0; }
    .info-emoji { font-size: 17px; flex-shrink: 0; margin-top: 1px; }
    .info-text { color: var(--ink-2); }
    .info-text strong { color: var(--ink); display: block; margin-bottom: 1px; }

    /* Guide cards */
    .guide-grid {
      display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
    }
    .guide-card {
      background: var(--white); border-radius: var(--radius-md);
      padding: 14px; border: 1px solid var(--border-lt);
      box-shadow: var(--shadow-sm); text-align: center;
    }
    .guide-emoji { font-size: 28px; margin-bottom: 6px; }
    .guide-name { font-size: 15px; font-weight: 600; color: var(--ink); }
    .guide-city { font-size: 11px; color: var(--ink-4); margin-top: 2px; }
    .guide-detail { font-size: 11px; color: var(--ink-3); margin-top: 4px; line-height: 1.4; }

    /* Etiquette list */
    .rule-item {
      padding: 9px 0; border-bottom: 1px solid var(--border-lt);
      display: flex; gap: 10px; font-size: 12.5px; line-height: 1.5;
    }
    .rule-item:last-child { border-bottom: none; }
    .rule-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }
    .rule-text { color: var(--ink-2); }
    .rule-text strong { color: var(--ink); }

    /* Booking notes */
    .booking-item {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; border-bottom: 1px solid var(--border-lt);
      font-size: 12px;
    }
    .booking-item:last-child { border-bottom: none; }
    .booking-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--red); flex-shrink: 0;
    }
    .booking-label { font-weight: 600; color: var(--ink); }
    .booking-note { color: var(--ink-3); margin-top: 1px; font-size: 11px; }

    /* ═══════════════════════════════════════════════
       EMERGENCY TAB
    ═══════════════════════════════════════════════ */
    .emergency-banner {
      background: var(--red); border-radius: var(--radius);
      padding: 18px 20px; color: #fff;
      margin-bottom: 14px; text-align: center;
    }
    .emergency-banner h2 {
      font-family: var(--font-serif); font-size: 22px; font-weight: 300;
      letter-spacing: 0.5px; margin-bottom: 4px;
    }

      padding: 13px 16px; border-bottom: 1px solid var(--border-lt);

      font-size: 13px; font-weight: 500;
      pointer-events: none; opacity: 0;
      transition: all 0.22s cubic-bezier(0.4, 0, 0.2, 1);

      white-space: nowrap; max-width: 90vw;

    @media (min-width: 700px) {

        margin-right: auto;

      }

      .trip-banner h2 { font-size: 36px; }

      #days-container {

      .trip-banner,

/* ═══════════════════════════════════════════════════════
   WEATHER — Open-Meteo (free, no API key required)
   ─────────────────────────────────────────────────────
   If you'd prefer OpenWeatherMap (requires API key),
   replace the URL below and update parseWeather().
   OpenWeatherMap key goes here: const OWM_KEY = 'YOUR_KEY';
═══════════════════════════════════════════════════════ */
const CITY_COORDS = {
  Tokyo:    { lat: 35.6762, lon: 139.6503 },
  Kyoto:    { lat: 35.0116, lon: 135.7681 },
  Yokohama: { lat: 35.4437, lon: 139.6380 }
};

function wmoToEmoji(code) {
  if (code === 0)                return { icon: '☀️', desc: 'Clear sky' };
  if (code <= 2)                 return { icon: '⛅', desc: 'Partly cloudy' };
  if (code === 3)                return { icon: '☁️', desc: 'Overcast' };
  if (code >= 45 && code <= 48) return { icon: '🌫️', desc: 'Foggy' };
  if (code >= 51 && code <= 57) return { icon: '🌦️', desc: 'Drizzle' };
  if (code >= 61 && code <= 67) return { icon: '🌧️', desc: 'Rain' };
  if (code >= 71 && code <= 77) return { icon: '❄️', desc: 'Snow' };
  if (code >= 80 && code <= 82) return { icon: '🌦️', desc: 'Showers' };
  if (code >= 95)                return { icon: '⛈️', desc: 'Thunderstorm' };
  return { icon: '🌤️', desc: 'Mixed' };
}

async function fetchWeather() {
  const cities = Object.entries(CITY_COORDS);
  const results = {};
  await Promise.allSettled(cities.map(async ([city, { lat, lon }]) => {
    try {
      const url = `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}`
        + `&daily=temperature_2m_max,temperature_2m_min,precipitation_probability_max,weathercode`
        + `&timezone=Asia%2FTokyo&forecast_days=16`;
      const res = await fetch(url);
      const data = await res.json();
      data.daily.time.forEach((date, i) => {
        results[`${city}-${date}`] = {
          max:  Math.round(data.daily.temperature_2m_max[i]),
          min:  Math.round(data.daily.temperature_2m_min[i]),
          rain: data.daily.precipitation_probability_max[i] ?? 0,
          code: data.daily.weathercode[i]
        };
      });
    } catch (e) { /* silent fail */ }
  }));
  return Object.keys(results).length ? results : null;
}

function getWeatherKey(day) {
  const city = day.city === 'Tokyo' && day.date === '2026-04-06' ? 'Yokohama'
             : day.city;
  return `${city}-${day.date}`;
}

function googleSearchUrl(q) {
  return `https://maps.google.com/?q=${encodeURIComponent(q)}`;
}
function googleNavUrl(q) {
  return `https://maps.google.com/maps?daddr=${encodeURIComponent(q)}&dirflg=d`;
}
function copyToClipboard(text, label) {
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(text).then(() => showToast(`${label} copied`));
  } else {
    const el = document.createElement('textarea');
    el.value = text; el.style.opacity = '0';
    document.body.appendChild(el); el.select();
    document.execCommand('copy');
    document.body.removeChild(el);
    showToast(`${label} copied`);
  }
}

let toastTimer;

  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}


/* ═══════════════════════════════════════════════════════
   CLOCK & DAY DETECTION
═══════════════════════════════════════════════════════ */
function getJSTDate() {
  const now = new Date();
  const jst = new Date(now.getTime() + (9 * 60 * 60 * 1000));
  return jst;
}
function todayISO() {
  const d = getJSTDate();
  return d.toISOString().split('T')[0];
}
function updateClock() {
  const d = getJSTDate();
  const h = String(d.getUTCHours()).padStart(2, '0');
  const m = String(d.getUTCMinutes()).padStart(2, '0');
  document.getElementById('jst-clock').textContent = `${h}:${m}`;
  // Trip day label
  const today = d.toISOString().split('T')[0];
  const dayObj = TRIP.days.find(day => day.date === today);
  const lbl = document.getElementById('trip-day-label');
  if (dayObj) {
    lbl.textContent = `Day ${dayObj.dayNum} of 10 · Japan`;
  } else {
    const start = new Date(TRIP.startDate);
    const end   = new Date(TRIP.endDate + 'T23:59:59Z');
    const nowUTC = new Date(d.toISOString());
    if (nowUTC < start) lbl.textContent = 'Trip begins ' + TRIP.startDate;
    else if (nowUTC > end) lbl.textContent = 'Trip complete · Sayōnara!';
    else lbl.textContent = 'Japan Standard Time';
  }
}

      return;

    el.innerHTML = `

function convertFX(from) {
  const jpyEl = document.getElementById('fx-jpy');
  const usdEl = document.getElementById('fx-usd');
  if (!jpyEl || !usdEl) return;
  if (from === 'jpy') {
    const jpy = parseFloat(jpyEl.value);
    usdEl.value = isNaN(jpy) ? '' : (jpy / FX_RATE).toFixed(2);
  } else {
    const usd = parseFloat(usdEl.value);
    jpyEl.value = isNaN(usd) ? '' : Math.round(usd * FX_RATE);
  }
}
function swapFX() {
  const jpyEl = document.getElementById('fx-jpy');
  const usdEl = document.getElementById('fx-usd');
  if (!jpyEl || !usdEl) return;
  const tmp = jpyEl.value;
  jpyEl.value = usdEl.value ? Math.round(parseFloat(usdEl.value) * FX_RATE) : '';
  usdEl.value = tmp ? (parseFloat(tmp) / FX_RATE).toFixed(2) : '';
}

function escHtml(str) {
  if (!str) return '';
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
            .replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
function escAttr(str) {
  if (!str) return '';
  return str.replace(/'/g, "\\'").replace(/"/g, '\\"');
}
